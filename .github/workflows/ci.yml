name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JVM + JS tests (Linux runner — fast and free)
  # ──────────────────────────────────────────────────────────────────────
  jvm-js:
    name: JVM + JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Core — compile JVM + JS
        run: ./gradlew :core:compileKotlinJvm :core:compileKotlinJs

      - name: Core — JVM tests
        run: ./gradlew :core:jvmTest

      - name: Connector MCP — JVM tests
        run: ./gradlew :connector-mcp:jvmTest

      - name: Connector Remote — JVM tests
        run: ./gradlew :connector-remote:jvmTest

      - name: JS browser tests
        run: ./gradlew :core:jsBrowserTest

      - name: JS browser distribution
        run: ./gradlew :core:jsBrowserProductionLibraryDistribution

      - name: Lint check (ktlint)
        run: ./gradlew ktlintCheck

  # ──────────────────────────────────────────────────────────────────────
  # Android build check
  # ──────────────────────────────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android example (debug)
        run: ./gradlew :example-android:assembleDebug

  # ──────────────────────────────────────────────────────────────────────
  # Android instrumented tests (requires emulator)
  # ──────────────────────────────────────────────────────────────────────
  android-instrumented:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew :core:connectedAndroidTest

  # ──────────────────────────────────────────────────────────────────────
  # Apple targets (macOS runner — needed for XCFramework)
  # ──────────────────────────────────────────────────────────────────────
  apple:
    name: Apple (iOS + macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build XCFramework
        run: ./gradlew assembleV8VCoreReleaseXCFramework
